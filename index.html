<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Fit Elite</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="icon" type="image/x-icon" href="/icons/favicon.ico"/>
<link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180x180.png"/>
<meta name="theme-color" content="#0a0a0a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Fit Elite"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<!--
  Environment config:
  - Local dev:  /env.js  (gitignored, create from env.example.js)
  - Production: Vercel routes /env.js → /api/env.js (reads from Vercel ENV vars)
-->
<script src="/env.js"></script>
<style>
/* ================================================================
   FIT ELITE — Design System v3
   ================================================================ */

/* ── Tokens ─────────────────────────────────────────────────────── */
:root {
  --ov:  #050505;
  --bg:  #0a0a0a;
  --s0:  #0f0f0f;
  --s1:  #141414;
  --s2:  #1a1a1a;
  --s3:  #20201f;
  --s4:  #262626;
  --s5:  #303030;

  --p:   #00c86e;
  --pd:  #009e52;
  --ps:  #002e17;
  --p1:  #00e676;
  --gp:  rgba(0,200,110,0.45);
  --gps: rgba(0,200,110,0.18);

  --push:  #6366f1; --pushL: #818cf8; --gpush: rgba(99,102,241,0.4);
  --pull:  #1a6fff; --pullL: #4da6ff; --gpull: rgba(26,111,255,0.4);
  --legs:  #7c3aed; --legsL: #a78bfa; --glegs: rgba(124,58,237,0.4);

  --ok:   #29b6c8;
  --warn: #ffb347;
  --err:  #f472b6;
  --info: #7ecfff;

  --t1: #f2f2f0;
  --t2: #adaaaa;
  --t3: #767575;
  --t4: #484847;

  --rx: 4px; --rs: 8px; --rm: 12px;
  --rl: 16px; --rxl: 24px; --r2xl: 32px; --rp: 9999px;

  --tb: 200ms; --tm: 280ms; --ts: 400ms;
  --e1: cubic-bezier(.4,0,.2,1);
  --esp: cubic-bezier(.34,1.56,.64,1);

  --nav-h: 64px;
}

/* ── Light theme override ────────────────────────────────────────── */
[data-theme="light"] {
  --bg:  #f4f4f2;
  --s0:  #ececea;
  --s1:  #e8e8e6;
  --s2:  #e0e0de;
  --s3:  #d8d8d6;
  --s4:  #c8c8c6;
  --s5:  #b8b8b6;
  --t1:  #0e0e0e;
  --t2:  #3a3a3a;
  --t3:  #6a6a6a;
  --t4:  #9a9a9a;
  --ov:  #f0f0ee;
}

/* ── Base ────────────────────────────────────────────────────────── */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; font-family:'Manrope',system-ui,sans-serif; background:#080808; -webkit-font-smoothing:antialiased; }
.material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24; line-height:1; user-select:none; display:inline-flex; align-items:center; }
.fi { font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }

/* ── Desktop centering ───────────────────────────────────────────── */
#root {
  width:100vw; height:100vh;
  display:flex; align-items:center; justify-content:center;
  background-image:
    linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
  background-size:32px 32px;
}

#frame {
  position:relative;
  width:390px; height:844px;
  border-radius:40px; overflow:hidden;
  background:var(--bg);
  display:flex; flex-direction:column;
  border:1px solid rgba(255,255,255,.07);
  box-shadow:0 0 0 1px rgba(0,0,0,.5), 0 32px 80px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.05);
}

/* ── Dynamic Island ──────────────────────────────────────────────── */
#island-wrap {
  display:flex;
  justify-content:center;
  padding:12px 0 8px;
  background:var(--bg);
  flex-shrink:0;
}

/* workout-bar web component sits here */
workout-bar {
  display:flex;
  justify-content:center;
  width:100%;
  background:transparent;
  padding:0;
}

/* ── Scroll area ─────────────────────────────────────────────────── */
#app {
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  scrollbar-width:none;
  background:var(--bg);
}
#app::-webkit-scrollbar { display:none; }

/* ── Bottom nav ──────────────────────────────────────────────────── */
#nav {
  flex-shrink:0;
  height:var(--nav-h);
  display:flex; align-items:center; justify-content:space-around;
  background:rgba(10,10,10,.96);
  backdrop-filter:blur(24px);
  border-top:1px solid rgba(255,255,255,.05);
}
.ni {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  flex:1; padding-top:8px;
  cursor:pointer; color:var(--t4);
  transition:color var(--tb) var(--e1);
  position:relative; min-height:44px;
}
.ni:hover { color:var(--t2); }
.ni.on { color:var(--p); }
.ni.on::before {
  content:'';
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:20px; height:2px;
  background:var(--p); border-radius:var(--rp);
  box-shadow:0 0 8px var(--gp);
}
.ni .material-symbols-outlined { font-size:22px; }
.nl { font-size:.5rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; }

/* ── Screen animation ────────────────────────────────────────────── */
.screen-in { animation:si var(--tm) var(--e1) both; }
@keyframes si { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ── Skeleton ────────────────────────────────────────────────────── */
.skel { background:var(--s2); border-radius:var(--rm); animation:sk 1.4s ease-in-out infinite; }
@keyframes sk { 0%,100%{opacity:.4} 50%{opacity:.8} }
.skel-hero  { height:80px; margin:20px; }
.skel-cards { height:120px; margin:0 20px; }

/* ════════════════════════════════════════════════════════════════
   HOME SCREEN
   ════════════════════════════════════════════════════════════════ */
.home-top { padding:32px 24px 16px; display:flex; align-items:center; justify-content:space-between; }
.h-greet  { font-size:.75rem; font-weight:600; color:var(--t3); }
.h-name   { font-size:1.75rem; font-weight:900; letter-spacing:-.035em; color:var(--t1); line-height:1.1; }
.h-date   { font-size:.5625rem; font-weight:700; color:var(--t3); letter-spacing:.06em; text-transform:uppercase; margin-top:2px; }
.av       { width:44px; height:44px; border-radius:50%; background:var(--s3); border:2px solid var(--t4); display:flex; align-items:center; justify-content:center; font-size:1.1rem; font-weight:900; color:var(--t2); }

/* Hero metric */
.hero-block   { padding:16px 24px 24px; }
.hero-label   { font-size:.5625rem; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:var(--t3); margin-bottom:4px; }
.hero-metric  { font-size:3.5rem; font-weight:900; letter-spacing:-.04em; line-height:1; color:var(--t1); }
.hero-unit    { font-size:1.5rem; font-weight:600; color:var(--t3); margin-left:4px; }
.hero-sub     { font-size:.75rem; font-weight:600; color:var(--t3); margin-top:4px; }

/* PPL bar */
.ppl-bar { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; padding:0 24px 24px; }
.ppl-btn {
  display:flex; flex-direction:column; align-items:center; gap:5px; padding:14px 8px;
  border-radius:var(--rl); border:1px solid var(--t4); background:var(--s1);
  cursor:pointer; position:relative; overflow:hidden;
  transition:all var(--tm) var(--e1);
}
.ppl-btn::before {
  content:''; position:absolute; inset:0; opacity:0;
  transition:opacity var(--tm) var(--e1); border-radius:inherit;
}
.ppl-btn[data-d="push"]::before { background:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,.18) 0%,transparent 70%); }
.ppl-btn[data-d="pull"]::before { background:radial-gradient(ellipse at 50% 0%,rgba(26,111,255,.18) 0%,transparent 70%); }
.ppl-btn[data-d="legs"]::before { background:radial-gradient(ellipse at 50% 0%,rgba(124,58,237,.18) 0%,transparent 70%); }
.ppl-btn.on::before { opacity:1; }
.ppl-icon { font-size:1.25rem; color:var(--t3); transition:color var(--tm); position:relative; z-index:1; }
.ppl-lbl  { font-size:.5625rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--t3); position:relative; z-index:1; transition:color var(--tm); }
.ppl-sub  { font-size:.375rem; color:var(--t3); text-align:center; position:relative; z-index:1; }

/* Today's plan */
.tmpl-section { padding:0 24px 24px; }
.tmpl-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.tmpl-title-lbl { font-size:.4375rem; font-weight:800; letter-spacing:.18em; text-transform:uppercase; color:var(--t3); }
.tmpl-name { font-size:.8125rem; font-weight:700; color:var(--t2); }
.tmpl-card { background:var(--s1); border:1px solid var(--t4); border-radius:var(--rxl); overflow:hidden; }
.tmpl-ex { padding:14px 14px 0; }
.ex-row { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--s4); }
.ex-row:last-child { border-bottom:none; }
.ex-num  { font-size:.5rem; font-weight:800; color:var(--t4); width:16px; text-align:center; }
.ex-dot  { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.ex-info { flex:1; }
.ex-name { font-size:.8125rem; font-weight:700; color:var(--t1); }
.ex-meta { font-size:.5rem; font-weight:600; color:var(--t3); margin-top:1px; }
.tmpl-actions {
  display:flex; align-items:center; gap:7px; padding:12px 14px;
  border-top:1px solid var(--s3); background:var(--s2);
}
.ta-btn {
  display:flex; align-items:center; gap:4px; height:34px; padding:0 10px;
  border-radius:var(--rs); border:1px solid var(--t4); background:transparent;
  color:var(--t3); font-size:.5rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
  cursor:pointer; transition:all var(--tb) var(--e1); flex-shrink:0; font-family:'Manrope',sans-serif;
}
.ta-btn:hover { border-color:var(--t3); color:var(--t2); }
.ta-fill { border-color:rgba(0,200,110,.3); background:rgba(0,200,110,.08); color:var(--p); }
.ta-start {
  flex:1; height:34px; border-radius:var(--rs); border:none; background:var(--pd); color:var(--t1);
  font-size:.75rem; font-weight:900; letter-spacing:.06em; text-transform:uppercase; cursor:pointer;
  box-shadow:0 4px 14px var(--gps); transition:all var(--tb) var(--e1);
  display:flex; align-items:center; justify-content:center; gap:5px; font-family:'Manrope',sans-serif;
}
.ta-start:hover { background:var(--p); }

/* Stat row */
.stat-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; padding:0 24px; }
.sc { background:var(--s1); border:1px solid var(--t4); border-radius:var(--rl); padding:16px 14px; }
.sc-l { font-size:.4375rem; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--t3); }
.sc-v { font-size:1.375rem; font-weight:900; letter-spacing:-.04em; line-height:1; margin-top:4px; }
.sc-u { font-size:.4375rem; font-weight:700; color:var(--t3); margin-top:2px; }

/* Nudge */
.nudge {
  display:flex; align-items:center; gap:10px; margin:12px 20px 0; padding:10px 12px;
  background:var(--s1); border:1px solid rgba(126,207,255,.2); border-radius:var(--rm);
}
.nudge-text { font-size:.75rem; font-weight:500; color:var(--t2); flex:1; line-height:1.5; }
.nudge-close { font-size:15px; color:var(--t4); cursor:pointer; }

/* Last workout */
.last-section { padding:24px 24px 0; }
.last-lbl { font-size:.4375rem; font-weight:800; letter-spacing:.18em; text-transform:uppercase; color:var(--t3); margin-bottom:8px; }
.last-card {
  display:flex; align-items:center; gap:12px; padding:12px 14px;
  background:var(--s1); border:1px solid var(--t4); border-radius:var(--rl);
  cursor:pointer; transition:background var(--tb) var(--e1);
}
.last-card:hover { background:var(--s2); }
.last-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.last-info { flex:1; }
.last-day  { font-size:.875rem; font-weight:700; color:var(--t1); }
.last-meta { font-size:.5625rem; font-weight:600; color:var(--t3); margin-top:2px; }
.rep-btn {
  display:flex; align-items:center; gap:4px; padding:6px 10px;
  border-radius:var(--rs); border:1px solid var(--t4); background:transparent;
  color:var(--t2); font-size:.5rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
  cursor:pointer; transition:all var(--tb) var(--e1); font-family:'Manrope',sans-serif;
}
.rep-btn:hover { color:var(--t1); border-color:var(--t3); }
.rep-btn .material-symbols-outlined { font-size:13px; }

/* ════════════════════════════════════════════════════════════════
   TRAIN SCREEN
   ════════════════════════════════════════════════════════════════ */

/* ── PPL Cards (new design) ────────────────────────────────────── */
.ppl-cards-wrap {
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:8px;
  padding:16px 16px 12px;
}

.ppl-card {
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:16px 12px;
  border-radius:var(--rxl);
  border:1px solid;
  cursor:pointer;
  transition:all var(--tb) var(--e1);
  min-height:110px;
}

.ppl-card:hover {
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,.3);
}

.ppl-card-header {
  position:absolute;
  top:10px;
  right:10px;
  display:flex;
  align-items:center;
  gap:4px;
}

.ppl-card-icon {
  position:absolute;
  top:10px;
  left:10px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.ppl-card-icon .material-symbols-outlined {
  font-size:20px;
}

.ppl-sets-counter {
  font-size:.625rem;
  font-weight:800;
  font-variant-numeric:tabular-nums;
  padding:2px 6px;
  border-radius:var(--rp);
  background:rgba(0,0,0,.2);
}

.ppl-card-name {
  font-size:.875rem;
  font-weight:900;
  letter-spacing:.02em;
  margin-top:28px;
}

.ppl-card-sub {
  font-size:.5rem;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--t3);
}

.ppl-card-add {
  border-style:dashed;
  background:transparent;
  border-color:var(--t4);
}

.ppl-card-add:hover {
  border-color:var(--p);
  background:rgba(0,200,110,0.06);
}

.ppl-card-icon-add {
  display:flex;
  align-items:center;
  justify-content:center;
  width:40px;
  height:40px;
  border-radius:50%;
  background:var(--s2);
  margin-top:8px;
}

.ppl-dot {
  width:8px;
  height:8px;
  border-radius:50%;
  box-shadow:0 0 8px currentColor;
}

.ppl-card-template {
  position:relative;
}

/* ── Search (compact) ─────────────────────────────────────────── */
.search-wrap {
  position:sticky;
  top:0;
  z-index:10;
  margin:0 16px 12px;
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--s1);
  border:1px solid var(--t4);
  border-radius:var(--rm);
  padding:0 12px;
  height:44px;
  transition:border-color var(--tb) var(--e1);
}

.search-wrap:focus-within { border-color:var(--p); }
.search-ico { font-size:18px; color:var(--t4); flex-shrink:0; }
.search-input {
  flex:1;
  height:44px;
  background:transparent;
  border:none;
  outline:none;
  color:var(--t1);
  font-family:'Manrope',sans-serif;
  font-size:.8125rem;
}
.search-input::placeholder { color:var(--t4); }
.search-clear { font-size:16px; color:var(--t4); cursor:pointer; }

.section-lbl { font-size:.4375rem; font-weight:800; letter-spacing:.18em; text-transform:uppercase; color:var(--t3); padding:8px 16px 4px; }

/* Template cards */
.template-cards { padding:0 16px 8px; display:flex; flex-direction:column; gap:7px; }
.t-tmpl-card {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 14px; background:var(--s1); border:1px solid; border-radius:var(--rl);
  cursor:pointer; transition:background var(--tb) var(--e1);
}
.t-tmpl-card:hover { background:var(--s2); }
.t-tmpl-card-left { display:flex; align-items:center; gap:10px; }
.t-tmpl-card-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.t-tmpl-card-name { font-size:.875rem; font-weight:700; color:var(--t1); }
.t-tmpl-card-sub  { font-size:.5rem; color:var(--t3); margin-top:1px; }
.t-tmpl-card-arrow { font-size:1.25rem; font-weight:700; }

.edit-ex-row {
  display:flex; align-items:center; padding:12px 14px;
  background:var(--s2); border:1px solid var(--s3); border-radius:var(--rm);
  transition:all var(--tb); margin-bottom: 6px;
}
.edit-ex-row.over { border-top: 2px solid var(--p); }

/* Exercise list */
.ex-list { padding:0 16px 8px; display:flex; flex-direction:column; gap:6px; }
.ex-item {
  display:flex; align-items:center; gap:10px; padding:10px 12px;
  background:var(--s1); border:1px solid var(--t4); border-radius:var(--rm);
  cursor:pointer; transition:background var(--tb) var(--e1);
}
.ex-item:hover { background:var(--s2); }
.ex-item-bar { width:3px; border-radius:2px; align-self:stretch; flex-shrink:0; min-height:28px; }
.ex-item-body { flex:1; min-width:0; }
.ex-item-name { font-size:.8125rem; font-weight:700; color:var(--t1); }
.ex-item-meta { font-size:.5rem; color:var(--t3); margin-top:1px; }
.ex-item-tag  { font-size:16px; color:var(--t4); flex-shrink:0; }

.empty-state { padding:32px 20px; text-align:center; font-size:.875rem; color:var(--t4); }

/* Bottom sheet */
.sheet-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,.6);
  z-index:20; backdrop-filter:blur(4px);
}
.sheet {
  position:absolute; left:0; right:0; bottom:0;
  background:var(--s1); border-radius:var(--r2xl) var(--r2xl) 0 0;
  z-index:21; max-height:85%; display:flex; flex-direction:column;
  transform:translateY(100%); transition:transform var(--tm) var(--e1);
}
.sheet-open { transform:translateY(0); }
.sheet-handle { width:36px; height:4px; border-radius:var(--rp); background:var(--t4); margin:12px auto 0; flex-shrink:0; }
.sheet-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px 12px; flex-shrink:0; }
.sheet-title  { font-size:1.125rem; font-weight:900; letter-spacing:-.02em; color:var(--t1); }
.sheet-sub    { font-size:.5625rem; font-weight:700; letter-spacing:.06em; margin-top:2px; }
.sheet-close  { width:32px; height:32px; border-radius:50%; background:var(--s3); border:none; color:var(--t2); display:flex; align-items:center; justify-content:center; cursor:pointer; }
.sheet-body   { flex:1; overflow-y:auto; padding:0 20px 16px; scrollbar-width:none; }
.sheet-body::-webkit-scrollbar { display:none; }
.mg-block     { margin-bottom:16px; }
.mg-header    { font-size:.5rem; font-weight:800; letter-spacing:.14em; text-transform:uppercase; margin-bottom:8px; padding-bottom:6px; border-bottom:0.5px solid var(--s4); }
.sheet-ex     { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:0.5px solid var(--s3); }
.sheet-ex:last-child { border-bottom:none; }
.sheet-ex-num  { font-size:.5rem; font-weight:800; color:var(--t4); min-width:20px; }
.sheet-ex-name { font-size:.8125rem; font-weight:700; color:var(--t1); }
.sheet-ex-meta { font-size:.5rem; color:var(--t3); margin-top:1px; }
.rotation-tag  { color:var(--warn); font-weight:800; }
.weighted-tag  { color:var(--ok); font-weight:800; }
.sheet-actions { padding:12px 20px 20px; flex-shrink:0; border-top:1px solid var(--s3); }
.sheet-start {
  width:100%; height:48px; border-radius:var(--rp); border:none;
  color:var(--t1); font-family:'Manrope',sans-serif; font-size:.9375rem; font-weight:900;
  letter-spacing:.08em; text-transform:uppercase; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:0 6px 20px rgba(0,0,0,.4); transition:all var(--tb) var(--e1);
}
.sheet-start:hover { filter:brightness(1.1); }

/* Active session */
.active-top {
  position:sticky; top:0; z-index:10; display:flex; align-items:center; justify-content:space-between;
  padding:16px 20px 12px;
  background:rgba(10,10,10,.96); backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.05);
}
.back-btn {
  width:34px; height:34px; border-radius:50%; background:var(--s2); border:1px solid var(--t4);
  display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--t2);
}
.sess-time { font-size:.5625rem; font-weight:800; color:var(--t3); letter-spacing:.08em; }
.fin-btn {
  padding:5px 12px; border-radius:var(--rs);
  border:1px solid rgba(244,114,182,.25); background:rgba(244,114,182,.08);
  color:var(--err); font-size:.4375rem; font-weight:800;
  letter-spacing:.1em; text-transform:uppercase; cursor:pointer;
  font-family:'Manrope',sans-serif; transition:all var(--tb) var(--e1);
}
.fin-btn-confirm {
  background:rgba(180,50,100,.22); color:#c93070; border-color:rgba(180,50,100,.45);
}

/* Exercise nav */
.ex-nav-wrap { padding:12px 16px 0; overflow-x:auto; scrollbar-width:none; }
.ex-nav-wrap::-webkit-scrollbar { display:none; }
.ex-nav { display:flex; gap:7px; width:max-content; }
.en-item {
  display:flex; flex-direction:column; align-items:center; gap:3px; padding:8px 12px;
  border-radius:var(--rm); border:1px solid var(--t4); background:var(--s1);
  cursor:pointer; min-width:72px; transition:all var(--tb) var(--e1);
}
.en-item.on { border-color:rgba(0,200,110,.4); background:rgba(0,200,110,.06); }
.en-item.done { opacity:.55; }
.en-item.next { opacity:.35; border-style:dashed; }
.en-add { border-style:dashed; color:var(--t3); min-width:44px; justify-content:center; background:transparent; cursor:pointer; }
.en-dot  { width:5px; height:5px; border-radius:50%; background:var(--t4); }
.en-item.on .en-dot { background:var(--p); box-shadow:0 0 5px var(--gp); }
.en-name { font-size:.5rem; font-weight:700; color:var(--t2); white-space:nowrap; }
.en-item.on .en-name { color:var(--p); }
.en-sets { font-size:.375rem; font-weight:800; color:var(--t3); }

/* Exercise header */
.ex-hdr  { padding:16px 20px 0; }
.ex-tags { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.tag { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:var(--rp); font-size:.5625rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase; border:1px solid; }
.tag-type      { background:var(--s2); color:var(--t2); border-color:var(--t4); }
.tag-weighted  { background:rgba(41,182,200,.1); color:var(--ok); border-color:rgba(41,182,200,.3); }
.tag-timed     { background:rgba(255,179,71,.1); color:var(--warn); border-color:rgba(255,179,71,.3); }
.ex-title { font-size:1.5rem; font-weight:900; letter-spacing:-.035em; line-height:1.1; font-style:italic; text-transform:uppercase; color:var(--t1); }
.prev-best { display:flex; align-items:center; gap:6px; margin-top:8px; font-size:.75rem; font-weight:600; color:var(--t3); }
.prev-best strong { color:var(--warn); font-weight:800; }

/* Timer */
.tmr-card {
  margin:16px 20px 0; background:var(--s1); border:1px solid var(--t4);
  border-radius:var(--rl); padding:20px; text-align:center;
  position:relative; overflow:hidden; transition:border-color var(--tm) var(--e1);
}
.tmr-card::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse at 50% 0%, var(--timer-glow,transparent) 0%, transparent 60%);
  transition:background var(--ts);
}
.tmr-card.active  { border-color:rgba(0,200,110,.35); --timer-glow:rgba(0,200,110,.08); }
.tmr-card.warning { border-color:rgba(255,179,71,.4);  --timer-glow:rgba(255,179,71,.08); }
.tmr-label { font-size:.5625rem; font-weight:800; letter-spacing:.2em; text-transform:uppercase; color:var(--t3); display:block; margin-bottom:8px; }
.tmr-ring-wrap { position:relative; width:140px; height:140px; margin:0 auto 14px; display:flex; align-items:center; justify-content:center; }
.tmr-ring { transform:rotate(-90deg); }
.ring-bg   { fill:none; stroke:var(--s4); stroke-width:3; }
.ring-fill { fill:none; stroke-width:3; stroke-linecap:round; transition:stroke-dashoffset .4s var(--e1), stroke var(--tm); }
.tmr-display { position:absolute; font-size:2.25rem; font-weight:900; letter-spacing:-.04em; font-feature-settings:'tnum'; transition:color var(--tm), text-shadow var(--tm); color:var(--t1); }
.tmr-display.active  { color:var(--p);    text-shadow:0 0 24px var(--gp); }
.tmr-display.warning { color:var(--warn); text-shadow:0 0 24px rgba(255,179,71,.55); }
.tmr-actions { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:14px; }
.tmr-btn {
  background:var(--s3); border:1px solid var(--t4); border-radius:var(--rp); padding:7px 16px;
  font-family:'Manrope',sans-serif; font-size:.8125rem; font-weight:700; color:var(--t2);
  cursor:pointer; transition:all var(--tb) var(--e1);
}
.tmr-btn:hover { background:var(--s4); color:var(--t1); }
.tmr-play {
  width:40px; height:40px; padding:0; border-radius:50%; background:var(--pd); border-color:var(--pd);
  color:var(--t1); display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 10px var(--gps);
}
.tmr-play .material-symbols-outlined { font-size:18px; }
/* Mini timer (Ultra minimalist) */
.tmr-card-ultra {
  margin:12px 24px 0; height:28px; background:var(--s2);
  border-radius:var(--rm); position:relative; overflow:hidden;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.15);
}
.tmr-ultra-fill {
  position:absolute; top:0; left:0; bottom:0; background:rgba(0,200,110,.25);
  width:100%; transform-origin:left; transition:transform 1s linear, background var(--tm);
}
.tmr-ultra-fill.warning { background:rgba(255,179,71,.35); }
.tmr-ultra-fill.done { background:rgba(41,182,200,.35); }
.tmr-ultra-text {
  position:relative; z-index:2; font-size:.8125rem; font-weight:800;
  font-feature-settings:'tnum'; color:var(--t1); letter-spacing:.05em;
  text-shadow:0 1px 2px rgba(0,0,0,.5);
}
.tmr-ultra-text.warning { color:var(--warn); }

/* Set logger */
.set-sect  { padding:14px 20px 0; }
.set-hdr   { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.set-title { font-size:.4375rem; font-weight:800; letter-spacing:.2em; text-transform:uppercase; color:var(--t3); }
.set-add   { display:flex; align-items:center; gap:3px; font-size:.4375rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--p); cursor:pointer; }
.set-cols  { display:grid; grid-template-columns:28px 1fr 1fr 1fr 36px; gap:6px; padding:0 10px 6px; }
.set-col-lbl { font-size:.5625rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--t4); text-align:center; }
.set-list  { display:flex; flex-direction:column; gap:5px; }
.set-row {
  display:grid; grid-template-columns:28px 1fr 1fr 1fr 36px; gap:6px; align-items:center;
  padding:10px; border-radius:var(--rm); border:1px solid var(--t4); background:var(--s2);
  transition:all var(--tm) var(--e1); position:relative;
}
.set-row.done    { background:rgba(41,182,200,.05); border-color:rgba(41,182,200,.25); }
.set-row.active  { background:rgba(0,200,110,.05); border-color:rgba(0,200,110,.4); box-shadow:0 0 0 1px rgba(0,200,110,.12), 0 4px 14px rgba(0,200,110,.06); padding:12px 10px; }
.set-row.locked  { opacity:.38; border-style:dashed; }

.lock-btn {
  background:transparent;
  border:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:4px;
  border-radius:var(--rs);
  color:var(--t4);
  transition:all var(--tb) var(--e1);
  opacity:0.3;
}

.lock-btn:hover {
  opacity:1;
  background:var(--s3);
  color:var(--t2);
}

.set-row.active .lock-btn {
  opacity:1;
  color:var(--p);
}

.set-row.active .lock-btn:hover {
  background:rgba(0,200,110,0.1);
}
.set-row.pr      { background:rgba(255,179,71,.05); border-color:rgba(255,179,71,.3); }
.set-num    { font-size:.8125rem; font-weight:800; color:var(--t3); text-align:center; }
.active-n   { color:var(--p); }
.set-val-wrap { display:flex; flex-direction:column; align-items:center; }
.set-in {
  background:transparent; border:none; outline:none; color:var(--t1);
  font-family:'Manrope',sans-serif; font-size:1rem; font-weight:800; text-align:center; width:100%; padding:0;
}
.active-i   { color:var(--p); font-size:1.0625rem; }
.set-in:disabled { color:var(--t3); }
.set-in::placeholder { color:var(--t4); font-weight:400; font-size:.875rem; }
.set-unit   { font-size:.5rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--t3); }
.set-prev   { font-size:.5rem; color:var(--t4); font-weight:600; margin-top:1px; }
.p-ok       { color:var(--ok); }
.locked-dash { color:var(--t4); font-size:.875rem; font-weight:600; display:block; text-align:center; }
.status-done-wrap { display:flex; flex-direction:column; align-items:center; gap:2px; }
.status-done { width:26px; height:26px; border-radius:50%; background:rgba(41,182,200,.15); display:flex; align-items:center; justify-content:center; }
.status-done .material-symbols-outlined { font-size:14px; color:var(--ok); }
.status-edit-lock { font-size:11px; color:var(--t4); opacity:.3; }
.status-pr { width:26px; height:26px; border-radius:50%; background:rgba(255,179,71,.18); display:flex; align-items:center; justify-content:center; }
.status-pr .material-symbols-outlined { font-size:13px; color:var(--warn); }
.status-active { width:8px; height:8px; border-radius:50%; background:var(--p); margin:auto; box-shadow:0 0 0 3px rgba(0,200,110,.2); animation:pulse 1.8s ease-in-out infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 3px rgba(0,200,110,.2)} 50%{box-shadow:0 0 0 5px rgba(0,200,110,.35)} }
.active-hint { grid-column:1/-1; display:flex; align-items:center; gap:6px; padding-top:6px; margin-top:4px; border-top:1px solid rgba(0,200,110,.12); font-size:.625rem; font-weight:700; color:var(--t3); }
.active-hint strong { color:var(--p); }
.input-error { border-bottom:1px solid var(--err) !important; }
.edit-save-btn { background:transparent; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; }

/* Volume summary */
.vol-summary {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--s1); border:1px solid var(--t4); border-radius:var(--rm);
  padding:12px 16px; margin:14px 20px 0;
}
.vol-item  { text-align:center; }
.vol-val   { font-size:1.25rem; font-weight:900; letter-spacing:-.03em; line-height:1; }
.vol-unit  { font-size:.75rem; font-weight:600; color:var(--t2); margin-left:2px; }
.vol-lbl   { font-size:.5rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--t3); margin-top:2px; }

/* FAB */
.fab-wrap {
  position:absolute; bottom:calc(var(--nav-h) + 12px); left:0; right:0;
  padding:0 20px; margin-bottom: 24px; pointer-events:none; z-index:30;
}
.fab-btn {
  pointer-events:auto; width:100%; height:52px;
  background:var(--pd); color:var(--t1); border:none; border-radius:var(--rp);
  font-family:'Manrope',sans-serif; font-size:.9375rem; font-weight:900;
  letter-spacing:.1em; text-transform:uppercase; cursor:pointer;
  box-shadow:0 8px 28px rgba(0,200,110,.38), 0 0 0 1px rgba(0,200,110,.18);
  transition:all var(--tb) var(--esp);
  display:flex; align-items:center; justify-content:center; gap:10px;
}
.fab-btn:hover  { background:var(--p); box-shadow:0 10px 36px rgba(0,200,110,.5); transform:translateY(-1px); }
.fab-btn:active { transform:scale(.97); }
.fab-btn .material-symbols-outlined { font-size:22px; }

/* Summary modal */
.modal-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,.7);
  z-index:40; backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center; padding:24px;
}
.modal {
  background:var(--s1); border:1px solid var(--t4); border-radius:var(--rxl);
  padding:24px; width:100%;
}
.modal-title { font-size:1.125rem; font-weight:900; letter-spacing:-.02em; color:var(--t1); margin-bottom:16px; }
.modal-rows  { display:flex; flex-direction:column; gap:2px; margin-bottom:20px; }
.modal-row   { display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:0.5px solid var(--s4); }
.modal-row:last-child { border-bottom:none; }
.modal-key   { font-size:.8125rem; color:var(--t2); font-weight:500; }
.modal-val   { font-size:.8125rem; font-weight:800; color:var(--t1); }
.modal-btns  { display:flex; gap:10px; }
.modal-btn   { flex:1; height:44px; border-radius:var(--rm); font-family:'Manrope',sans-serif; font-size:.8125rem; font-weight:800; cursor:pointer; transition:all var(--tb) var(--e1); border:none; }
.modal-discard { background:var(--s3); color:var(--t2); }
.modal-discard:hover { background:var(--s4); color:var(--t1); }
.modal-save  { background:var(--pd); color:var(--t1); box-shadow:0 4px 14px var(--gps); }
.modal-save:hover { background:var(--p); }

/* ════════════════════════════════════════════════════════════════
   TODAY'S PLAN UPGRADES — A/B toggle, collapsible groups, plan viewer
   ════════════════════════════════════════════════════════════════ */
.ab-toggle { display:flex; gap:6px; margin-top:1px; }
.ab-pill {
  display:inline-flex; align-items:center; justify-content:center;
  width:26px; height:22px; border-radius:6px; background:var(--s3);
  color:var(--t3); font-size:.625rem; font-weight:800; cursor:pointer;
  border:1px solid var(--t4); transition:all .2s; user-select:none;
}
.ab-pill.active { background:var(--p); color:var(--s1); border-color:var(--p); }
.ab-pill.disabled { opacity:.3; pointer-events:none; }

/* collapsible muscle groups inside Today's Plan card */
.tmpl-mg-sec { border-top:1px solid var(--s3); }
.tmpl-mg-sec:first-child { border-top:none; }
.tmpl-mg-hdr {
  display:flex; align-items:center; justify-content:space-between;
  padding:7px 0; cursor:pointer; min-height:36px; user-select:none;
}
.tmpl-mg-hdr:active { opacity:.7; }
.tmpl-mg-name { font-size:.625rem; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--t3); }
.tmpl-mg-chevron {
  font-size:16px; color:var(--t4); transition:transform .2s var(--e1);
}
.tmpl-mg-chevron.rot { transform:rotate(90deg); }

.tmpl-mg-body { display:block; }
.tmpl-mg-body.collapsed { display:none; }
.tmpl-mg-body.expanded .ex-row { min-height:44px; }

/* "View Full Plan" CTA */
.view-full-plan {
  display:flex; align-items:center; justify-content:center; gap:6px;
  width:100%; padding:10px 0; border-top:1px solid var(--s3);
  font-size:.625rem; font-weight:700; color:var(--p); letter-spacing:.04em;
  cursor:pointer; background:transparent; border:none; border-radius:0;
  text-transform:uppercase; transition:opacity .15s;
}
.view-full-plan:hover { opacity:.75; }

/* scrollable exercise list inside Today's Plan card */
.tmpl-card-scroll {
  max-height:180px; overflow-y:auto; scrollbar-width:thin;
  scrollbar-color:var(--s4) transparent;
  padding:0 14px;
}
.tmpl-card-scroll::-webkit-scrollbar { width:3px; }
.tmpl-card-scroll::-webkit-scrollbar-thumb { background:var(--s4); border-radius:2px; }

/* full-screen plan viewer sheet */
.sheet.sheet-plan-viewer {
  position:fixed; inset:0; max-height:100%; border-radius:0;
  z-index:31; transform:translateY(100%); transition:transform .3s var(--e1);
  display:flex; flex-direction:column; background:var(--s1);
}
.sheet.sheet-plan-viewer.sheet-open { transform:translateY(0); }
.sheet-overlay.plan-viewer-overlay { z-index:30 !important; }
.plan-viewer-header {
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:16px 20px 8px; flex-shrink:0;
}
.plan-viewer-header .pv-close {
  display:flex; align-items:center; justify-content:center;
  width:36px; height:36px; border-radius:50%; background:var(--s3);
  color:var(--t1); border:none; cursor:pointer; flex-shrink:0;
}
.plan-viewer-title { font-size:.875rem; font-weight:800; color:var(--t1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.plan-viewer-search { padding:0 20px 10px; flex-shrink:0; }
.plan-viewer-body { flex:1; overflow-y:auto; padding:0 20px 16px; }
.plan-viewer-footer {
  padding:12px 20px 28px; flex-shrink:0; border-top:1px solid var(--s3);
}

/* muscle group blocks for search results (train.js) */
.mg-block {
  margin-bottom:14px;
}
.mg-block-hdr {
  font-size:.5625rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase;
  color:var(--t3); padding:4px 0 8px; border-bottom:1px solid var(--s3);
  margin-bottom:4px;
}
.stats-top   { padding:24px 20px 0; }
.stats-title { font-size:1.75rem; font-weight:900; letter-spacing:-.035em; color:var(--t1); margin-bottom:12px; }
.tab-line { display:flex; border-bottom:1px solid var(--t4); overflow-x:auto; scrollbar-width:none; }
.tab-line::-webkit-scrollbar { display:none; }
.tl-tab {
  padding:9px 12px; font-size:.5625rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
  color:var(--t3); cursor:pointer; white-space:nowrap; border-bottom:2px solid transparent;
  margin-bottom:-1px; transition:all var(--tb) var(--e1); flex-shrink:0;
}
.tl-tab.on { color:var(--p); border-bottom-color:var(--p); }
.stats-body { padding:16px 20px 0; }

.rec-group        { margin-bottom:20px; }
.rec-group-header { font-size:.5rem; font-weight:800; letter-spacing:.14em; text-transform:uppercase; margin-bottom:8px; }
.rec-item {
  background:var(--s1); border:1px solid var(--t4); border-radius:var(--rm);
  margin-bottom:6px; overflow:hidden; cursor:pointer; transition:border-color var(--tb) var(--e1);
}
.rec-item:hover { border-color:var(--t3); }
.rec-item-open { border-color:var(--p); }
.rec-item-main { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; }
.rec-item-left { flex:1; }
.rec-item-name { font-size:.8125rem; font-weight:700; color:var(--t1); }
.rec-item-meta { font-size:.5rem; color:var(--t3); margin-top:2px; }
.rec-item-right { text-align:right; }
.rec-item-kg   { font-size:1.375rem; font-weight:900; letter-spacing:-.03em; line-height:1; }
.rec-item-unit { font-size:.5rem; font-weight:700; color:var(--t3); }
.rec-chart-wrap { padding:0 12px 12px; }

.chart-section  { display: block; }
.chart-title    { font-size:.5rem; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:var(--t3); margin:12px 0 8px; }
.period-picker  { display:flex; gap:6px; margin-bottom:4px; }
.period-btn {
  padding:5px 12px; border-radius:var(--rp); font-size:.5625rem; font-weight:800;
  letter-spacing:.06em; cursor:pointer; border:1px solid var(--t4); color:var(--t3);
  background:var(--s1); transition:all var(--tb) var(--e1);
}
.period-btn.on { border-color:var(--p); color:var(--p); background:rgba(0,200,110,.08); }
canvas { width:100% !important; display:block; }
.chart-legend { display:flex; justify-content:space-between; margin-top:12px; padding:12px 14px; background:var(--s1); border:1px solid var(--t4); border-radius:var(--rm); }
.legend-item  { text-align:center; }
.legend-val   { font-size:1.125rem; font-weight:900; letter-spacing:-.03em; color:var(--t1); }
.legend-lbl   { font-size:.4375rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--t3); margin-top:2px; }

/* ════════════════════════════════════════════════════════════════
   PROFILE SCREEN
   ════════════════════════════════════════════════════════════════ */
.p-hero { padding:24px 20px 16px; display:flex; align-items:center; gap:14px; }
.p-av   { width:68px; height:68px; border-radius:50%; background:var(--s3); border:2px solid var(--t4); display:flex; align-items:center; justify-content:center; font-size:1.625rem; font-weight:900; color:var(--t2); flex-shrink:0; }
.p-name { font-size:1.375rem; font-weight:900; letter-spacing:-.025em; color:var(--t1); margin-bottom:4px; }
.p-meta { font-size:.5625rem; font-weight:600; color:var(--t3); display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
.p-meta-dot { color:var(--t4); }
.p-sec       { margin:0 16px 14px; }
.p-sec-title { font-size:.4375rem; font-weight:800; letter-spacing:.18em; text-transform:uppercase; color:var(--t3); padding:0 2px; margin-bottom:6px; }
.p-card      { background:var(--s1); border:1px solid var(--t4); border-radius:var(--rl); overflow:hidden; }
.s-row { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; border-bottom:1px solid var(--s3); }
.s-row:last-child { border-bottom:none; }
.s-left  { display:flex; align-items:center; gap:10px; }
.s-icon  { font-size:18px; color:var(--t3); }
.s-label { font-size:.8125rem; font-weight:600; color:var(--t1); }
.s-sub   { font-size:.5rem; font-weight:600; color:var(--t3); margin-top:1px; }
.tog {
  width:44px; height:24px; flex-shrink:0;
  background:var(--s4); border:1px solid var(--t4); border-radius:var(--rp);
  cursor:pointer; position:relative; transition:all var(--tb) var(--e1);
}
.tog::after { content:''; position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:var(--t3); transition:transform var(--tm) var(--esp), background var(--tb); }
.tog.on { background:var(--pd); border-color:var(--pd); box-shadow:0 0 10px var(--gps); }
.tog.on::after { transform:translateX(20px); background:var(--t1); }

/* Segment controls */
.theme-toggle, .lang-toggle, .unit-toggle {
  display:flex; background:var(--s3); border-radius:var(--rp); padding:2px; gap:2px;
}
.theme-opt, .lang-opt, .unit-opt {
  padding:4px 10px; border-radius:var(--rp); font-size:.4375rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
  background:transparent; color:var(--t3); cursor:pointer; transition:all var(--tb) var(--e1); white-space:nowrap;
}
.theme-opt.on, .lang-opt.on, .unit-opt.on { background:var(--s5); color:var(--t1); }

/* Stepper */
.stepper { display:flex; align-items:center; gap:6px; }
.step-btn {
  width:28px; height:28px; border-radius:50%; background:var(--s3); border:1px solid var(--t4);
  color:var(--t2); font-size:1rem; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all var(--tb) var(--e1); font-family:'Manrope',sans-serif;
}
.step-btn:hover { background:var(--s4); color:var(--t1); }
.step-val { font-size:.75rem; font-weight:800; color:var(--t1); min-width:40px; text-align:center; }

/* Recovery code */
.code-wrap { display:flex; align-items:center; gap:8px; }
.recovery-code { font-family:monospace; font-size:.875rem; font-weight:700; color:var(--p); letter-spacing:.04em; }
.icon-btn-sm { background:transparent; border:none; color:var(--t3); cursor:pointer; display:flex; align-items:center; transition:color var(--tb) var(--e1); }
.icon-btn-sm:hover { color:var(--t1); }

/* Sync dot */
@keyframes syncPulse {
  0% { box-shadow: 0 0 0 0 rgba(0,200,110,0.4); }
  70% { box-shadow: 0 0 0 6px rgba(0,200,110,0); }
  100% { box-shadow: 0 0 0 0 rgba(0,200,110,0); }
}
.sync-dot { width:10px; height:10px; border-radius:50%; background:var(--t4); transition:background .3s; }
.sync-dot.syncing { background:var(--pd); animation: syncPulse 1.5s infinite; }
.sync-dot.synced  { background:var(--p); box-shadow:0 0 6px var(--gp); }
.sync-dot.pending { background:var(--warn); }
.sync-dot.offline { background:var(--err); }
.sync-dot.error   { background:#ff4a7a; box-shadow:0 0 6px rgba(255,74,122,0.4); }

/* Export */
.exp-row { display:flex; gap:7px; padding:12px 14px; border-bottom:1px solid var(--s3); }
.exp-btn {
  display:flex; align-items:center; justify-content:center; gap:5px; flex:1; height:38px;
  border-radius:var(--rm); border:1px solid var(--t4); background:var(--s2); color:var(--t2);
  font-size:.5rem; font-weight:800; letter-spacing:.06em; text-transform:uppercase;
  cursor:pointer; transition:all var(--tb) var(--e1); font-family:'Manrope',sans-serif;
}
.exp-btn:hover { border-color:var(--t3); color:var(--t1); }
.exp-btn-p { background:rgba(0,200,110,.08); border-color:rgba(0,200,110,.25); color:var(--p); }
.import-zone {
  margin:10px 14px; border:1.5px dashed var(--t4); border-radius:var(--rl);
  padding:24px 14px; text-align:center; cursor:pointer; transition:all var(--tb) var(--e1);
}
.import-zone:hover { border-color:var(--p); background:rgba(0,200,110,.04); }
.iz-title { font-size:.75rem; font-weight:700; color:var(--t2); margin-bottom:3px; }
.iz-sub   { font-size:.5625rem; color:var(--t3); }

/* Danger */
.danger-btn {
  width:100%; height:42px; border-radius:var(--rm);
  border:1px solid rgba(244,114,182,.25); background:transparent; color:var(--err);
  font-size:.8125rem; font-weight:700; cursor:pointer; display:flex; align-items:center;
  justify-content:center; gap:7px; transition:all var(--tb) var(--e1); font-family:'Manrope',sans-serif;
}
.danger-btn:hover { background:rgba(244,114,182,.08); border-color:rgba(244,114,182,.4); }

/* ════════════════════════════════════════════════════════════════
   TOAST
   ════════════════════════════════════════════════════════════════ */
.toast {
  position:fixed; bottom:calc(var(--nav-h) + 12px); left:50%; transform:translateX(-50%) translateY(8px);
  background:var(--s3); border:1px solid var(--t4); border-radius:var(--rl);
  padding:10px 18px; font-size:.8125rem; font-weight:600; color:var(--t1);
  display:flex; align-items:center; gap:8px; z-index:100; white-space:nowrap;
  opacity:0; transition:opacity .2s var(--e1), transform .2s var(--e1); pointer-events:none;
}
.toast-in { opacity:1; transform:translateX(-50%) translateY(0); }

/* ════════════════════════════════════════════════════════════════
   Phase 2 / Extensions
   ════════════════════════════════════════════════════════════════ */
.plan-viewer { position:fixed; inset:0; background:var(--bg); z-index:50; display:flex; flex-direction:column; transform:translateY(100%); transition:transform .3s cubic-bezier(0.2,0.8,0.2,1); overflow-y:auto; }
.plan-viewer.open { transform:translateY(0); }
.collapsible-body { transition:max-height .3s ease, opacity .2s ease; overflow:hidden; }
.collapsible-body.collapsed { max-height:0; opacity:0; pointer-events:none; margin:0; padding:0; }
.search-group-hdr { padding:14px 20px 6px; font-size:.6875rem; font-weight:800; letter-spacing:.15em; text-transform:uppercase; color:var(--t3); background:var(--bg); z-index:2; text-shadow:0 1px 2px rgba(0,0,0,0.5); border-bottom:1px solid rgba(255,255,255,0.02); margin-top:4px; }
</style>
</head>
